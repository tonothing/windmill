name: Release windmill

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: tonothing/windmill-custom
          token: ${{ secrets.PAT_TOKEN }}
          path: windmill-custom
          fetch-depth: 0

      - name: Authenticate GitHub CLI with PAT
        run: |
          echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
          gh auth status

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release script from windmill-custom
        # working-directory: windmill-custom
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x windmill-custom/release.sh
          ./windmill-custom/release.sh
